name: Unit Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Debug variant only — this app never ships a release build (see
      # Distribution Plan), so building/kapt-ing release here is pure waste.
      # It's also what caused kaptDebugKotlin to crash with a reflection
      # InvocationTargetException: running both variants' kapt at once
      # overloads the GitHub Actions runner, a known kapt/JDK17 flakiness
      # mode. assembleDebug (build.yml) only ever built debug and never hit
      # it — scoping this job the same way removes the redundant work AND
      # the failure mode.
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/test-results/testDebugUnitTest/
