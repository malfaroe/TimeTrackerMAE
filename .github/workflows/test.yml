name: Unit Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Pure-Kotlin unit tests only (WeeklyReportCalculator, ChartMath,
      # TimerViewModel) — no Android SDK/emulator needed, so this finishes in
      # seconds and gives fast feedback decoupled from the full APK build
      # (design doc: Approach B feasibility mitigation).
      - name: Run unit tests
        run: ./gradlew test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/test-results/testDebugUnitTest/
